name: Release Build

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build and upload extension artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Chrome extension
        run: npm run package

      - name: Build Firefox extension
        run: npm run package:firefox

      - name: Build Safari extension
        run: npm run package:safari

      - name: Rename artifacts with release tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          mv dist.zip "alparslan-chrome-${TAG}.zip"
          mv dist-firefox.zip "alparslan-firefox-${TAG}.zip"
          mv dist-safari.zip "alparslan-safari-${TAG}.zip"

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            alparslan-chrome-*.zip
            alparslan-firefox-*.zip
            alparslan-safari-*.zip
